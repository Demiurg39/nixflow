#
# .-------------------------------------------------.
# |         MANGO WM CONFIGURATION FILE             |
# |      Ported from Hyprland with Love             |
# '-------------------------------------------------'
#

# --- Set keybinds sharable across keymodes ---
keymode=common

bind=Super,Delete,quit
bind=Super,r,reload_config

# .-------------------------------------------------.
# |      [ >_ ]  Applications & Core                |
# '-------------------------------------------------'
#
# .-------------------------------------------------.
# |      [ >_ ]  APPS & LAUNCHERS                   |
# '-------------------------------------------------'

# ===================================================

keymode=default

# Terminal (Kitty)
bind=Super,Return,spawn,kitty

# Launchers
bind=Super,c,spawn_shell,pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy

# NOTE: For quickshell launcher (leave it for later)
bind=Super,Tab,spawn_shell,pkill fuzzel || fuzzel

# NOTE: backfall for fuzzel
bind=Super+Shift,Tab,spawn_shell,pkill fuzzel || fuzzel

# Apps (Ported from Hyprland vars)
bind=Super,b,spawn,qutebrowser
bind=Super,f,spawn,nemo
bind=Super,e,spawn,neovide
bind=Ctrl+Shift,Escape,spawn,missioncenter

# Emoji Picker
# bind=Super,Period,spawn,pkill fuzzel || fuzzel-emoji

# Color Picker (Hyprpicker)
# bind=Super+Shift,c,spawn,hyprpicker -a

# .-------------------------------------------------.
# |      [ X ]  Window Management (Basic)           |
# '-------------------------------------------------'

# Close active window
bind=Super,q,killclient
bind=Alt,F4,killclient

bind=Alt,Tab,focusstack

# Toggle Fullscreen
bind=Alt,Return,togglefullscreen

# Focus Navigation
bind=Super,h,focusdir,left
bind=Super,j,focusdir,down
bind=Super,k,focusdir,up
bind=Super,l,focusdir,right

bind=Super,Left,focusdir,left
bind=Super,Right,focusdir,right
bind=Super,Up,focusdir,up
bind=Super,Down,focusdir,down

# Window swapp
# "exchange_client" swaps the window, "movewin" moves it floating
bind=Super+Ctrl,h,exchange_client,left
bind=Super+Ctrl,j,exchange_client,down
bind=Super+Ctrl,k,exchange_client,up
bind=Super+Ctrl,l,exchange_client,right

bind=Super+Ctrl,Left,exchange_client,left
bind=Super+Ctrl,Down,exchange_client,down
bind=Super+Ctrl,Up,exchange_client,up
bind=Super+Ctrl,Right,exchange_client,right

# Resize windows
bind=Super+Shift,h,resizewin,-30,0
bind=Super+Shift,j,resizewin,0,30
bind=Super+Shift,k,resizewin,0,-30
bind=Super+Shift,l,resizewin,30,0

bind=Super+Shift,Left,resizewin,-30,0
bind=Super+Shift,Down,resizewin,0,30
bind=Super+Shift,Up,resizewin,0,-30
bind=Super+Shift,Right,resizewin,30,0

# Switching layout
bind=Super+Shift,t,setlayout,tile
bind=Super+Shift,v,setlayout,vertical_grid
bind=Super+Shift,s,setlayout,scroller
bind=Super+Shift,f,togglefloating

# .-------------------------------------------------.
# |      [ 1 ]  Tags / Workspaces                   |
# '-------------------------------------------------'

# NOTE: in future make something like
# in end-4 dotfiles
# Switch to Tag (1-9)
bind=Super,1,view,1
bind=Super,2,view,2
bind=Super,3,view,3
bind=Super,4,view,4
bind=Super,5,view,5
bind=Super,6,view,6
bind=Super,7,view,7
bind=Super,8,view,8
bind=Super,9,view,9
bind=Super,0,view,10

# Relative
bind=Super,[,viewtoleft,1
bind=Super,],viewtoright,1

# Move Window to Tag
bind=Super+Shift,1,tag,1
bind=Super+Shift,2,tag,2
bind=Super+Shift,3,tag,3
bind=Super+Shift,4,tag,4
bind=Super+Shift,5,tag,5
bind=Super+Shift,6,tag,6
bind=Super+Shift,7,tag,7
bind=Super+Shift,8,tag,8
bind=Super+Shift,9,tag,9
bind=Super+Shift,0,tag,10

# Silent
bind=Super+Shift,1,tagsilent,1
bind=Super+Shift,2,tagsilent,2
bind=Super+Shift,3,tagsilent,3
bind=Super+Shift,4,tagsilent,4
bind=Super+Shift,5,tagsilent,5
bind=Super+Shift,6,tagsilent,6
bind=Super+Shift,7,tagsilent,7
bind=Super+Shift,8,tagsilent,8
bind=Super+Shift,9,tagsilent,9
bind=Super+Shift,0,tagsilent,10

# Move Window to relative Tag
bind=Super+Shift,[,tagtoleft,1
bind=Super+Shift,],tagtoright,1

# .-------------------------------------------------.
# |      (( ))  Media & Hardware Keys               |
# '-------------------------------------------------'

# Volume (using wpctl)
# NOTE: in future make osd in quickshell
# Also made if muted, volume changing unmuting automatically
bind=None,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=None,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=None,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=None,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# NOTE: same as for volume
# Brightness
bind=None,XF86MonBrightnessUp,spawn,brightnessctl s 5%+
bind=None,XF86MonBrightnessDown,spawn,brightnessctl s 5%-

# NOTE: in future make window for music
# Playerctl (Music)
bind=Super+Shift,k,spawn,playerctl play-pause
bind=Super+Shift,j,spawn,playerctl previous
bind=Super+Shift,l,spawn,playerctl next

# Screenshots
# Save full screen
bind=None,Print,spawn_shell,grim ~/Pictures/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png
# Print/Partial
bind=Shift,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy

# .-------------------------------------------------.
# |      [ M ]  MODES & LAYERS SETUP                |
# '-------------------------------------------------'

# Mode: System Operations (Screenshots, Exit, Reload)
# Trigger: Super + S (S for System)
bind=Super,s,setkeymode,system_ops

# +=================================================+
# |   LAYER: system_ops (Active: Super + S)         |
# +=================================================+
keymode=system_ops

# --- Gaps ---
bind=Super,Plus,incgaps,2
bind=Super,Minus,incgaps,-2
bind=Super,0,togglegaps

# --- Exit Mode ---
bind=None,Escape,setkeymode,common
bind=Super,s,setkeymode,common

# --- Session Control ---
# 'l' for Lock
bind=None,l,spawn,hyprlock

# TODO: make here binds for powermenu in quickshell


# .-------------------------------------------------.
# |      [ # ]  RULES & MOUSE                       |
# '-------------------------------------------------'
keymode=default

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_right,moveresize,curresize
